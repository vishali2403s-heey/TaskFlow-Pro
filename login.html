<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow Pro | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="brand-mark">TF</div>
      <h2>Welcome back</h2>
      <p class="text-muted">Sign in to continue your workflow.</p>
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-control" placeholder="you@company.com" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <input type="password" id="password" class="form-control" placeholder="••••••••" required />
            <button class="btn btn-outline-light" type="button" id="togglePassword"><i class="fa-solid fa-eye"></i></button>
          </div>
        </div>
        <button class="btn btn-primary w-100">Sign In</button>
      </form>
      <p class="mt-3 mb-0 text-center"><a href="register.html">Create an account</a></p>
    </div>
  </div>
  <script src="js/login.js"></script>
</body>
</html>
