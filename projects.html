<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow Pro | Projects</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">TF</div>
        <div><h4 class="mb-0">TaskFlow Pro</h4><small class="text-muted">Work OS</small></div>
      </div>
      <nav>
        <a href="dashboard.html"><i class="fa-solid fa-grid-2"></i> Dashboard</a>
        <a class="active" href="projects.html"><i class="fa-solid fa-folder-open"></i> Projects</a>
        <a href="tasks.html"><i class="fa-solid fa-list-check"></i> Tasks</a>
        <a href="analytics.html"><i class="fa-solid fa-chart-pie"></i> Analytics</a>
        <a href="team.html"><i class="fa-solid fa-users"></i> Team</a>
        <a href="notifications.html"><i class="fa-solid fa-bell"></i> Notifications</a>
        <a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
        <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
      </nav>
    </aside>
    <main class="main">
      <div class="topbar">
        <div><h2 class="mb-1">Projects</h2><p class="text-muted mb-0">Plan and monitor your delivery roadmap.</p></div>
        <div class="topbar-actions">
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#projectModal">+ New Project</button>
        </div>
      </div>
      <div class="panel">
        <div class="row g-3 mb-3">
          <div class="col-md-8"><input id="projectSearch" class="form-control" placeholder="Search projects" /></div>
          <div class="col-md-4"><select id="projectFilter" class="form-select"><option value="all">All Status</option><option value="Pending">Pending</option><option value="In Progress">In Progress</option><option value="Completed">Completed</option></select></div>
        </div>
        <div id="projectsGrid" class="row g-3"></div>
      </div>
    </main>
  </div>

  <div class="modal fade" id="projectModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content p-3">
        <div class="modal-header border-0"><h5 class="modal-title">Project Details</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <form id="projectForm">
            <input type="hidden" id="projectId" />
            <div class="mb-3"><input class="form-control" id="projectName" placeholder="Project name" required /></div>
            <div class="mb-3"><textarea class="form-control" id="projectDescription" placeholder="Description"></textarea></div>
            <div class="row g-2">
              <div class="col-md-6"><select class="form-select" id="projectStatus"><option>Pending</option><option>In Progress</option><option>Completed</option></select></div>
              <div class="col-md-6"><input class="form-control" id="projectProgress" type="number" min="0" max="100" placeholder="Progress %" /></div>
            </div>
            <div class="mt-3"><input class="form-control" id="projectDeadline" type="date" /></div>
            <button class="btn btn-primary mt-3 w-100">Save Project</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/projects.js"></script>
</body>
</html>
