<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow Pro | Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="brand-mark">TF</div>
      <h2>Create account</h2>
      <p class="text-muted">Join your team and launch work faster.</p>
      <form id="registerForm">
        <div class="mb-3"><label class="form-label">Name</label><input id="name" class="form-control" required /></div>
        <div class="mb-3"><label class="form-label">Email</label><input type="email" id="email" class="form-control" required /></div>
        <div class="mb-3"><label class="form-label">Password</label><input type="password" id="password" class="form-control" required /></div>
        <div class="mb-3"><label class="form-label">Confirm Password</label><input type="password" id="confirmPassword" class="form-control" required /></div>
        <button class="btn btn-primary w-100">Create Account</button>
      </form>
      <p class="mt-3 mb-0 text-center"><a href="login.html">Already have an account?</a></p>
    </div>
  </div>
  <script src="js/register.js"></script>
</body>
</html>
