<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow Pro | Team</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">TF</div>
        <div><h4 class="mb-0">TaskFlow Pro</h4><small class="text-muted">Work OS</small></div>
      </div>
      <nav>
        <a href="dashboard.html"><i class="fa-solid fa-grid-2"></i> Dashboard</a>
        <a href="projects.html"><i class="fa-solid fa-folder-open"></i> Projects</a>
        <a href="tasks.html"><i class="fa-solid fa-list-check"></i> Tasks</a>
        <a href="analytics.html"><i class="fa-solid fa-chart-pie"></i> Analytics</a>
        <a class="active" href="team.html"><i class="fa-solid fa-users"></i> Team</a>
        <a href="notifications.html"><i class="fa-solid fa-bell"></i> Notifications</a>
        <a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
        <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
      </nav>
    </aside>
    <main class="main">
      <div class="topbar"><div><h2 class="mb-1">Team</h2><p class="text-muted mb-0">Add collaborators and keep delivery coordinated.</p></div></div>
      <div class="panel">
        <form id="memberForm" class="row g-3 mb-3">
          <div class="col-md-3"><input class="form-control" id="memberName" placeholder="Name" required /></div>
          <div class="col-md-4"><input class="form-control" id="memberEmail" placeholder="Email" required /></div>
          <div class="col-md-3"><select class="form-select" id="memberRole"><option>Developer</option><option>Manager</option><option>Tester</option><option>Member</option></select></div>
          <div class="col-md-2"><button class="btn btn-primary w-100">Add</button></div>
        </form>
        <div id="membersGrid" class="row g-3"></div>
      </div>
    </main>
  </div>
  <script src="js/team.js"></script>
</body>
</html>
