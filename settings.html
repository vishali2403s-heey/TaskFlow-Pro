<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow Pro | Settings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">TF</div>
        <div><h4 class="mb-0">TaskFlow Pro</h4><small class="text-muted">Work OS</small></div>
      </div>
      <nav>
        <a href="dashboard.html"><i class="fa-solid fa-grid-2"></i> Dashboard</a>
        <a href="projects.html"><i class="fa-solid fa-folder-open"></i> Projects</a>

        <button class="btn btn-primary" onclick="document.body.classList.toggle('dark')">Toggle Preview</button>
