<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow Pro | Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">TF</div>
        <div><h4 class="mb-0">TaskFlow Pro</h4><small class="text-muted">Work OS</small></div>
      </div>
      <nav>
        <a href="dashboard.html"><i class="fa-solid fa-grid-2"></i> Dashboard</a>
        <a href="projects.html"><i class="fa-solid fa-folder-open"></i> Projects</a>
        <a href="tasks.html"><i class="fa-solid fa-list-check"></i> Tasks</a>
        <a href="analytics.html"><i class="fa-solid fa-chart-pie"></i> Analytics</a>
        <a href="team.html"><i class="fa-solid fa-users"></i> Team</a>
        <a href="notifications.html"><i class="fa-solid fa-bell"></i> Notifications</a>
        <a class="active" href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
        <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
      </nav>
    </aside>
    <main class="main">
      <div class="topbar"><div><h2 class="mb-1">Profile</h2><p class="text-muted mb-0">Manage your identity and workspace preferences.</p></div></div>
      <div class="panel">
        <div class="row g-4 align-items-center">
          <div class="col-md-3 text-center"><div class="brand-badge mx-auto" style="width:88px;height:88px;font-size:28px;">U</div><p class="mt-3 mb-0" id="profileName"></p></div>
          <div class="col-md-9">
            <h5>Account Summary</h5>
            <p id="profileEmail"></p>
            <div class="row g-3">
              <div class="col-sm-4"><div class="stat-card"><h3>Projects</h3><div class="value" id="profileProjects">0</div></div></div>
              <div class="col-sm-4"><div class="stat-card"><h3>Tasks</h3><div class="value" id="profileTasks">0</div></div></div>
              <div class="col-sm-4"><div class="stat-card"><h3>Completed</h3><div class="value" id="profileCompleted">0</div></div></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="js/profile.js"></script>
</body>
</html>
